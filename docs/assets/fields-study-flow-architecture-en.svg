<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="650" viewBox="0 0 1240 650">
<style>text{font-family:Arial,'Microsoft YaHei',sans-serif;letter-spacing:0}</style>
<rect width="1240" height="650" rx="26" fill="#F7FAFD"/>
<text x="44" y="60" font-size="34" font-weight="800" fill="#172033" text-anchor="start">fields-study-flow</text>
<text x="44" y="95" font-size="17" fill="#657085"><tspan x="44" dy="0">Unified mastery paths for papers, fields, courses, local resources, and live discovery</tspan></text>
<line x1="44" y1="122" x2="1196" y2="122" stroke="#D8E2EE" stroke-width="2"/>
<rect x="44" y="154" width="360" height="390" rx="18" fill="#FFFFFF" stroke="#62A9D9" stroke-width="2"/>
<rect x="44" y="154" width="360" height="58" rx="18" fill="#EAF5FF" stroke="#62A9D9" stroke-width="2"/>
<circle cx="78" cy="183" r="18" fill="#62A9D9"/>
<text x="78" y="189" font-size="17" font-weight="700" fill="#F7FAFD" text-anchor="middle">1</text>
<text x="110" y="190" font-size="22" font-weight="700" fill="#172033" text-anchor="start">Goal + Profile</text>
<text x="74" y="246" font-size="16" fill="#172033"><tspan x="74" dy="0">paper / field / course</tspan></text>
<circle cx="84" cy="287" r="5" fill="#62A9D9"/>
<text x="100" y="292" font-size="14" fill="#657085"><tspan x="100" dy="0">route depth: fastest, balanced,</tspan><tspan x="100" dy="19">complete</tspan></text>
<circle cx="84" cy="339" r="5" fill="#62A9D9"/>
<text x="100" y="344" font-size="14" fill="#657085"><tspan x="100" dy="0">learning style: practical, theory,</tspan><tspan x="100" dy="19">video</tspan></text>
<circle cx="84" cy="391" r="5" fill="#62A9D9"/>
<text x="100" y="396" font-size="14" fill="#657085"><tspan x="100" dy="0">language and time preferences</tspan></text>
<path d="M 416 348 C 434 348, 410 348, 428 348" fill="none" stroke="#D8E2EE" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="440" y="154" width="360" height="390" rx="18" fill="#FFFFFF" stroke="#85C996" stroke-width="2"/>
<rect x="440" y="154" width="360" height="58" rx="18" fill="#ECF8EF" stroke="#85C996" stroke-width="2"/>
<circle cx="474" cy="183" r="18" fill="#85C996"/>
<text x="474" y="189" font-size="17" font-weight="700" fill="#F7FAFD" text-anchor="middle">2</text>
<text x="506" y="190" font-size="22" font-weight="700" fill="#172033" text-anchor="start">Resource Discovery</text>
<text x="470" y="246" font-size="16" fill="#172033"><tspan x="470" dy="0">open APIs + explicit local paths</tspan></text>
<circle cx="480" cy="287" r="5" fill="#85C996"/>
<text x="496" y="292" font-size="14" fill="#657085"><tspan x="496" dy="0">arXiv, OpenAlex, Semantic Scholar,</tspan><tspan x="496" dy="19">GitHub, Hugging Face</tspan></text>
<circle cx="480" cy="339" r="5" fill="#85C996"/>
<text x="496" y="344" font-size="14" fill="#657085"><tspan x="496" dy="0">PDF, TeX, notebooks, notes, code</tspan></text>
<circle cx="480" cy="391" r="5" fill="#85C996"/>
<text x="496" y="396" font-size="14" fill="#657085"><tspan x="496" dy="0">credentialed sources stay</tspan><tspan x="496" dy="19">manual-link-only</tspan></text>
<path d="M 812 348 C 830 348, 806 348, 824 348" fill="none" stroke="#D8E2EE" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="836" y="154" width="360" height="390" rx="18" fill="#FFFFFF" stroke="#9F8FE8" stroke-width="2"/>
<rect x="836" y="154" width="360" height="58" rx="18" fill="#F2EFFF" stroke="#9F8FE8" stroke-width="2"/>
<circle cx="870" cy="183" r="18" fill="#9F8FE8"/>
<text x="870" y="189" font-size="17" font-weight="700" fill="#F7FAFD" text-anchor="middle">3</text>
<text x="902" y="190" font-size="22" font-weight="700" fill="#172033" text-anchor="start">Mastery Path</text>
<text x="866" y="246" font-size="16" fill="#172033"><tspan x="866" dy="0">explain, derive, reproduce,</tspan><tspan x="866" dy="22">critique</tspan></text>
<circle cx="876" cy="287" r="5" fill="#9F8FE8"/>
<text x="892" y="292" font-size="14" fill="#657085"><tspan x="892" dy="0">route audit and quality gates</tspan></text>
<circle cx="876" cy="339" r="5" fill="#9F8FE8"/>
<text x="892" y="344" font-size="14" fill="#657085"><tspan x="892" dy="0">study tasks, next actions, final</tspan><tspan x="892" dy="19">artifact</tspan></text>
<circle cx="876" cy="391" r="5" fill="#9F8FE8"/>
<text x="892" y="396" font-size="14" fill="#657085"><tspan x="892" dy="0">Markdown, JSON, SVG, HTML report</tspan></text>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#D8E2EE"/></marker>
</defs>
<rect x="44" y="574" width="1152" height="44" rx="14" fill="#FFF7DE" stroke="#F3C85E"/>
<text x="68" y="601" font-size="15" fill="#172033"><tspan x="68" dy="0">Default path is balanced; switch to fastest for shortest viable mastery or complete for broader coverage.</tspan></text>
</svg>