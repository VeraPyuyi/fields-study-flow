<rect x="44" y="574" width="1152" height="44" rx="14" fill="#FFF7DE" stroke="#F3C85E"/>
<text x="68" y="601" font-size="15" fill="#172033"><tspan x="68" dy="0">默认使用平衡路线；需要最短路径用 fastest，需要完整覆盖用 complete。</tspan></text>
